# Authoritative main config — not the base image's own nginx.conf. Patching
# nginx past its base image's package pin (see the Dockerfile) triggers a
# forced package reinstall that replaces Docker Hub's customized nginx.conf
# with stock Alpine's (different vhost dir, conf.d include in the wrong
# context), breaking our templated server block. Owning this file outright
# makes the config deterministic regardless of what the package manager does.
user nginx;
worker_processes auto;
pid /run/nginx/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server_tokens off;
    sendfile on;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    include /etc/nginx/conf.d/*.conf;
}
