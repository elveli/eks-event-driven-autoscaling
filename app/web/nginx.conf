server {
    listen 80;
    server_name _;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # TODO: proxy_pass /api/ to the Lambda function URL (submit jobs, presign).
    # location /api/ { proxy_pass https://TODO-lambda-url/; }

    location /healthz { return 200 'ok'; add_header Content-Type text/plain; }
}
