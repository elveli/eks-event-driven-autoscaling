# Argo CD Application — points at gitops/manifests/ and keeps the cluster in
# sync with Git. TODO: set repoURL to your repo, and enable automated sync.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: burstlab
  namespace: argocd
spec:
  project: default
  source:
    repoURL: TODO-https://github.com/you/burstlab.git
    targetRevision: main
    path: gitops/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: burstlab
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: ["CreateNamespace=true"]
