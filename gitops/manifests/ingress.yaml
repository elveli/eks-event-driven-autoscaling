# ALB Ingress via AWS Load Balancer Controller.
# TODO: annotations for internet-facing ALB, target-type ip, health check path.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: burstlab
  namespace: burstlab
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: burstlab-web, port: { number: 80 } } }
