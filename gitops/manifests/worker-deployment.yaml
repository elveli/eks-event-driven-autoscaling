# Worker Deployment. ServiceAccount is IRSA-annotated with the worker role
# (from app-resources module output). KEDA scales this 0..N.
# TODO: fill image (ECR worker URL @ git-SHA tag — NEVER :latest), env
#       (QUEUE_URL, BUCKET), resources, and the SA annotation
#       eks.amazonaws.com/role-arn: <worker_role_arn>.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eda-worker
  namespace: eda
spec:
  replicas: 0          # KEDA owns this; start at zero
  selector: { matchLabels: { app: eda-worker } }
  template:
    metadata: { labels: { app: eda-worker } }
    spec:
      serviceAccountName: eda-worker
      containers:
        - name: worker
          image: TODO-ecr-worker-url:TODO-sha
