# Dashboard Deployment: nginx (static UI + /api proxy) plus a cluster-stats
# sidecar — same image, different command (see app/web/Dockerfile). The
# sidecar is why the pod runs as the eda-web ServiceAccount: it lists pods
# and nodes with the RBAC in rbac.yaml.
#
# replicas is omitted on purpose: the CPU HPA (web-hpa.yaml) owns it, and a
# value here would make Argo CD's selfHeal fight the HPA. The image
# registry/tag is pinned by CI in kustomization.yaml.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eda-web
  namespace: eda
spec:
  selector:
    matchLabels: { app: eda-web }
  template:
    metadata:
      labels: { app: eda-web }
    spec:
      serviceAccountName: eda-web
      containers:
        - name: web
          image: eda-web
          ports:
            - containerPort: 80
          env:
            # Host of the Lambda Function URL for nginx's /api/ proxy;
            # rendered into the config by the image's envsubst entrypoint.
            - name: LAMBDA_ORIGIN
              valueFrom:
                configMapKeyRef: { name: eda-app-config, key: LAMBDA_ORIGIN }
          readinessProbe:
            httpGet: { path: /healthz, port: 80 }
          resources:
            # The CPU request is what the HPA's Utilization target is
            # relative to — the HPA is meaningless without it. CPU limits
            # omitted on purpose (compressible; requests give fair-share).
            requests: { cpu: 100m, memory: 64Mi }
            limits: { memory: 128Mi }
        - name: stats
          image: eda-web
          command: ["python3", "/opt/eda/stats_server.py"]
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { memory: 128Mi }
