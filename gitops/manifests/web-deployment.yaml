  selector: { matchLabels: { app: burstlab-web } }
  template:
    metadata: { labels: { app: burstlab-web } }
    spec:
      containers:
        - name: web
          image: TODO-ecr-web-url:TODO-sha
          ports: [{ containerPort: 80 }]
